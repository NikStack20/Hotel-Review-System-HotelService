server:
  port: 7050

spring:
  application:
    name: HOTEL-SERVICE
  profiles:
      active: dev 
  datasource:
    url: jdbc:postgresql://localhost:5432/myservice_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update   # <- DB entries auto update
    show-sql: true       # <- SQL true
  config:
    import: optional:configserver:http://localhost:7054         # [optional] To get rid from application fallback.
